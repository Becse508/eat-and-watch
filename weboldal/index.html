<!DOCTYPE html>
<html lang="hu">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Eat&Watch</title>
    <link href="https://fonts.cdnfonts.com/css/komika-axis" rel="stylesheet" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link

  <body>

      <components-moviecarousel></components-moviecarousel>

      <components-showcase
        image="https://files.catbox.moe/xjku2q.png"

        direction="right">Osztálykirándulás esetén csak egy telefonhívásba kerül, és leárazott jegyeket adhatunk mindenkinek.</components-showcase>

    <components-footer></components-footer>
