<!DOCTYPE html>
<html lang="hu">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Eat&Watch | Filmek</title>
    <link href="https://fonts.cdnfonts.com/css/komika-axis" rel="stylesheet" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="shortcut icon" href="https://files.catbox.moe/seu2yv.webp" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200..800&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  </head>
  <body>
    <components-navbar>
      <components-title class="brand montserrat black" title-role="nav">Eat&Watch</components-title>
      <div class="nav-right">
        <components-theme-toggle></components-theme-toggle>
      </div>
    </components-navbar>

    <main class="movies-main">
      <div class="movies-header">
        <h1 class="movie-page-title montserrat black">Filmek</h1>
        
        <div class="filters-container inter">
          <input type="text" id="search-input" class="search-input inter" placeholder="Keresés..." />
          
            <span class="bold inter">Hossz</span>
          <div class="length-filter">
            <input type="number" id="length-min" class="length-input inter" placeholder="perc" min="0" />
            <span class="bold inter">-től</span>
            <input type="number" id="length-max" class="length-input inter" placeholder="perc" min="0" />
            <span class="bold inter">-ig</span>
          </div>

          <div class="adult-filter">
            <input type="checkbox" id="adult-checkbox" class="adult-checkbox" checked />
            <span class="bold inter">18+</span>
          </div>
        </div>
      </div>

      <div class="movies-content">
        <components-moviegrid id="movies-grid"></components-moviegrid>
        <div id="no-results" class="inter bold" style="display: none; text-align: center; width: 100%; margin-top: 40px; font-size: 20px; color: var(--text-muted);">
          Nincs a keresésnek megfelelő film.
        </div>
      </div>
    </main>

    <components-footer></components-footer>
    <script type="module" src="/src/main.ts"></script>
    <script type="module" src="/src/movies.ts"></script>
  </body>
</html>
