<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Eat&Watch | Menetrend szerkesztése</title>
  <link href="https://fonts.cdnfonts.com/css/komika-axis" rel="stylesheet" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200..800&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
  <components-navbar>
    <components-title class="brand montserrat black" title-role="nav">Eat&Watch</components-title>
    <div class="nav-right">
      <components-theme-toggle></components-theme-toggle>
    </div>
  </components-navbar>

  <main class="admin-main edit-main">
    <h1 class="page-title montserrat black">Menetrend szerkesztése</h1>

    <div class="form-group inter">
      <label class="bold">Kiválasztott terem</label>
      <div class="room-selector" id="room-selector">
        <button class="room-btn active" data-room="1">1</button>
        <button class="room-btn" data-room="2">2</button>
        <button class="room-btn" data-room="3">3</button>
      </div>
    </div>

    <div class="form-group inter">
      <label class="bold">Dátum és idő</label>
      <div class="time-picker-container">
        <div class="time-box">
          <input type="datetime-local" id="start-time" class="time-input inter" />
        </div>
        <span class="arrow">➔</span>
        <div class="time-box">
          <input type="datetime-local" id="end-time" class="time-input inter" disabled />
        </div>
      </div>
    </div>

    <div class="form-group inter" style="width: 100%;">
      <label class="bold">Film</label>
      <input type="text" id="movie-search" class="search-input inter" placeholder="Keresés..." />
      
      <div class="movie-selector-grid" id="movie-selector-grid">
        <!-- Filmek dinamikusan generálva -->
      </div>
    </div>
  </main>

  <div class="bottom-action-bar inter">
    <div class="left-actions">
      <button id="stop-movie-btn" class="btn-stop bold" style="display: none;">Film leállítása</button>
    </div>
    <div class="right-actions">
      <a href="/admin-rooms" class="btn-text">Elvetés</a>
      <button id="save-btn" class="btn-save">Mentés</button>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
  <script type="module" src="/src/admin-room-edit.ts"></script>
</body>
</html>
